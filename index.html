<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fiscalización en Tiempo Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .plate-font { font-family: 'Courier New', monospace; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #modalConfig { display: none; }
        #modalConfig.active { display: flex; }
    </style>
</head>
<body class="pb-24">

    <!-- Modal de Inicio de Sesión -->
    <div id="modalConfig" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm card-shadow text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2">Acceso Grupal</h3>
            <p class="text-slate-500 mb-6 text-sm">Ingrese su nombre. Todos los registros serán compartidos en tiempo real.</p>
            <input type="text" id="nombreInspectorInput" placeholder="Nombre completo" 
                class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none mb-4 text-center font-semibold text-lg">
            <button onclick="guardarConfiguracion()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all active:scale-95 shadow-lg shadow-blue-200">
                INICIAR TURNO COMPARTIDO
            </button>
        </div>
    </div>

    <div class="max-w-xl mx-auto p-4 space-y-4">
        <!-- Header con Resumen -->
        <header class="bg-slate-900 rounded-[2rem] p-6 text-white card-shadow relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight">Panel Centralizado</h1>
                        <p id="fechaHeader" class="text-slate-400 text-xs font-medium"></p>
                    </div>
                    <div class="bg-blue-600/20 px-4 py-2 rounded-2xl border border-blue-500/30">
                        <span id="contadorRegistros" class="text-2xl font-black text-blue-400">0</span>
                        <span class="text-[10px] uppercase font-bold text-blue-300 ml-1">Total Hoy</span>
                    </div>
                </div>
                <div class="flex items-center space-x-3 bg-white/5 p-3 rounded-2xl border border-white/10">
                    <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center font-bold text-white">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" /></svg>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-[10px] uppercase text-slate-500 font-black">Mi Identidad</p>
                        <p id="displayInspector" class="text-sm font-bold truncate">Conectando...</p>
                    </div>
                </div>
            </div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-blue-600/10 rounded-full blur-3xl"></div>
        </header>

        <!-- Formulario -->
        <main class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Número de Placa</label>
                    <input type="text" id="placa" placeholder="V7X-841" maxlength="7"
                        class="plate-font w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none text-2xl text-center transition-all">
                </div>
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Infracción / Estado</label>
                    <select id="tipoInfraccion" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none font-semibold text-slate-700">
                        <option value="Operativo Normal">✅ Operativo Normal</option>
                        <option value="Placa distinta al servicio">⚠️ Placa distinta al servicio</option>
                        <option value="Sin SOAT Vigente">❌ Sin SOAT Vigente</option>
                        <option value="Fuera de Ruta">🛣️ Fuera de Ruta</option>
                        <option value="Sin Licencia">🆔 Sin Licencia / Vencida</option>
                        <option value="Vehículo Informal">🚗 Vehículo Informal</option>
                        <option value="Otros">📝 Otros (Ver Observaciones)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Observaciones</label>
                    <textarea id="observacion" rows="2" placeholder="Detalles de la intervención..."
                        class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none text-sm font-medium"></textarea>
                </div>

                <button id="btnRegistrar" onclick="guardarRegistroNube()" disabled
                    class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-200 disabled:bg-slate-100 disabled:text-slate-300 disabled:shadow-none transition-all active:scale-[0.98] uppercase tracking-widest text-sm">
                    Subir a Base de Datos
                </button>
            </div>
        </main>

        <!-- Herramientas -->
        <div class="flex justify-between items-center px-4">
            <button onclick="exportarCSV()" class="text-blue-600 text-[11px] font-extrabold flex items-center tracking-tighter">
                📥 EXPORTAR TODO (CSV)
            </button>
            <button onclick="confirmarLimpiezaNube()" class="text-red-400 hover:text-red-600 text-[11px] font-extrabold tracking-tighter transition-colors">
                🗑️ BORRAR BASE DE DATOS
            </button>
        </div>

        <!-- Lista de Registros Compartidos -->
        <div id="listaRegistros" class="space-y-4 px-2"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración de Firebase (inyectada por el entorno)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const plateInput = document.getElementById('placa');
        const listContainer = document.getElementById('listaRegistros');
        const counter = document.getElementById('contadorRegistros');
        const inspectorDisplay = document.getElementById('displayInspector');
        const btnReg = document.getElementById('btnRegistrar');
        
        let currentUser = null;
        let inspectorName = "";
        let registrosLocales = [];

        // 1. Autenticación
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                verificarInspector();
            } else {
                initAuth();
            }
        });

        const verificarInspector = () => {
            const saved = localStorage.getItem('user_fiscal_global');
            if (!saved) {
                document.getElementById('modalConfig').classList.add('active');
            } else {
                inspectorName = saved;
                inspectorDisplay.innerText = inspectorName;
                iniciarSincronizacion();
            }
        };

        window.guardarConfiguracion = () => {
            const name = document.getElementById('nombreInspectorInput').value.trim();
            if (name.length < 3) return alert("Nombre demasiado corto.");
            localStorage.setItem('user_fiscal_global', name);
            inspectorName = name;
            inspectorDisplay.innerText = name;
            document.getElementById('modalConfig').classList.remove('active');
            iniciarSincronizacion();
        };

        // 2. Sincronización en Tiempo Real (Firestore)
        const iniciarSincronizacion = () => {
            if (!currentUser) return;
            
            // Ruta pública para que todos vean lo mismo
            const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'intervenciones');
            
            // Escuchar cambios (onSnapshot)
            onSnapshot(dataCol, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                
                // Ordenar por tiempo (más reciente primero)
                data.sort((a, b) => b.timestamp - a.timestamp);
                registrosLocales = data;
                renderizar(data);
            }, (error) => {
                console.error("Error de Firestore:", error);
            });
        };

        // 3. Guardar en la Nube
        window.guardarRegistroNube = async () => {
            if (!currentUser) return alert("No autenticado");
            
            btnReg.disabled = true;
            const nuevo = {
                placa: plateInput.value,
                tipo: document.getElementById('tipoInfraccion').value,
                obs: document.getElementById('observacion').value || "Sin detalles",
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                inspector: inspectorName,
                timestamp: Date.now()
            };

            try {
                const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'intervenciones');
                await addDoc(dataCol, nuevo);
                
                plateInput.value = '';
                document.getElementById('observacion').value = '';
            } catch (e) {
                alert("Error al subir: " + e.message);
                btnReg.disabled = false;
            }
        };

        // 4. Borrar de la Nube
        window.eliminarRegistroNube = async (id) => {
            if (!confirm("¿Eliminar este registro de la base de datos compartida?")) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'intervenciones', id);
                await deleteDoc(docRef);
            } catch (e) {
                alert("Error al eliminar: " + e.message);
            }
        };

        window.confirmarLimpiezaNube = async () => {
            if (!confirm("⚠️ ATENCIÓN: Se borrarán los registros de TODOS los inspectores. ¿Continuar?")) return;
            try {
                const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'intervenciones');
                const snapshot = await getDocs(dataCol);
                const deletePromises = snapshot.docs.map(d => deleteDoc(d.ref));
                await Promise.all(deletePromises);
                alert("Base de datos limpiada.");
            } catch (e) {
                alert("Error al limpiar: " + e.message);
            }
        };

        // UI y Render
        const renderizar = (data) => {
            counter.innerText = data.length;
            if (data.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-slate-400 py-10 uppercase text-[10px] font-bold tracking-widest">Esperando registros compartidos...</p>';
                return;
            }

            listContainer.innerHTML = data.map(item => `
                <div class="bg-white rounded-3xl p-5 border border-slate-100 card-shadow">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="plate-font text-xl text-slate-900">${item.placa}</span>
                            <div class="mt-1 flex items-center gap-2">
                                <span class="px-2 py-1 rounded-lg text-[8px] font-black uppercase ${item.tipo === 'Operativo Normal' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${item.tipo}
                                </span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-300 uppercase">${item.hora}</p>
                            <p class="text-[8px] font-bold text-blue-500 truncate max-w-[80px]">${item.inspector}</p>
                        </div>
                    </div>
                    <p class="text-xs text-slate-500 mt-3 font-medium bg-slate-50 p-3 rounded-xl border border-slate-100 italic">
                        "${item.obs}"
                    </p>
                    <button onclick="eliminarRegistroNube('${item.id}')" class="mt-2 text-slate-200 hover:text-red-500 w-full flex justify-end">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            `).join('');
        };

        // Formato Placa
        plateInput.addEventListener('input', (e) => {
            let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (val.length > 3) val = val.slice(0, 3) + '-' + val.slice(3, 6);
            e.target.value = val;
            btnReg.disabled = val.length < 7;
        });

        // Exportar
        window.exportarCSV = () => {
            if (registrosLocales.length === 0) return alert("No hay datos en la nube.");
            let csv = "\uFEFFHora,Placa,Resultado,Observacion,Inspector\n";
            registrosLocales.forEach(r => {
                csv += `"${r.hora}","${r.placa}","${r.tipo}","${r.obs.replace(/"/g, '""')}","${r.inspector}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Reporte_Global_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        };

        document.getElementById('fechaHeader').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    </script>
</body>
</html>
