<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fiscalización de Transporte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .plate-font { font-family: 'Courier New', monospace; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #modalConfig { display: none; }
        #modalConfig.active { display: flex; }
    </style>
</head>
<body class="pb-24">

    <!-- Modal de Inicio de Sesión -->
    <div id="modalConfig" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm card-shadow text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2">Fiscalización</h3>
            <p class="text-slate-500 mb-6 text-sm">Identifíquese para registrar las intervenciones de hoy.</p>
            <input type="text" id="nombreInspectorInput" placeholder="Nombre completo" 
                class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none mb-4 text-center font-semibold text-lg">
            <button onclick="guardarConfiguracion()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all active:scale-95 shadow-lg shadow-blue-200">
                INICIAR TURNO
            </button>
        </div>
    </div>

    <div class="max-w-xl mx-auto p-4 space-y-4">
        <!-- Header con Resumen -->
        <header class="bg-slate-900 rounded-[2rem] p-6 text-white card-shadow relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight">Panel de Control</h1>
                        <p id="fechaHeader" class="text-slate-400 text-xs font-medium"></p>
                    </div>
                    <div class="bg-blue-600/20 px-4 py-2 rounded-2xl border border-blue-500/30">
                        <span id="contadorRegistros" class="text-2xl font-black text-blue-400">0</span>
                        <span class="text-[10px] uppercase font-bold text-blue-300 ml-1">Unidades</span>
                    </div>
                </div>
                <div class="flex items-center space-x-3 bg-white/5 p-3 rounded-2xl border border-white/10">
                    <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center font-bold text-white">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" /></svg>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-[10px] uppercase text-slate-500 font-black">Fiscalizador Activo</p>
                        <p id="displayInspector" class="text-sm font-bold truncate">Cargando sesión...</p>
                    </div>
                </div>
            </div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-blue-600/10 rounded-full blur-3xl"></div>
        </header>

        <!-- Formulario -->
        <main class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Número de Placa</label>
                    <input type="text" id="placa" placeholder="V7X-841" maxlength="7"
                        class="plate-font w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none text-2xl text-center transition-all">
                </div>
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Infracción / Estado</label>
                    <select id="tipoInfraccion" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none font-semibold text-slate-700">
                        <option value="Operativo Normal">✅ Operativo Normal</option>
                        <option value="Placa distinta al servicio">⚠️ Placa distinta al servicio</option>
                        <option value="Sin SOAT Vigente">❌ Sin SOAT Vigente</option>
                        <option value="Fuera de Ruta">🛣️ Fuera de Ruta</option>
                        <option value="Sin Licencia">🆔 Sin Licencia / Vencida</option>
                        <option value="Vehículo Informal">🚗 Vehículo Informal</option>
                        <option value="Otros">📝 Otros (Ver Observaciones)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Observaciones</label>
                    <textarea id="observacion" rows="2" placeholder="Detalles de la intervención..."
                        class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none text-sm font-medium"></textarea>
                </div>

                <button id="btnRegistrar" onclick="guardar()" disabled
                    class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl shadow-slate-200 disabled:bg-slate-100 disabled:text-slate-300 disabled:shadow-none transition-all active:scale-[0.98] uppercase tracking-widest text-sm">
                    Guardar Intervención
                </button>
            </div>
        </main>

        <!-- Herramientas -->
        <div class="flex justify-between items-center px-4">
            <button onclick="exportarCSV()" class="text-blue-600 text-[11px] font-extrabold flex items-center tracking-tighter">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                EXPORTAR EXCEL (CSV)
            </button>
            <button onclick="confirmarLimpieza()" class="text-slate-400 hover:text-red-600 text-[11px] font-extrabold tracking-tighter transition-colors">
                BORRAR JORNADA
            </button>
        </div>

        <!-- Lista de Registros -->
        <div id="listaRegistros" class="space-y-4 px-2">
            <!-- Los registros se cargan aquí -->
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'FISCAL_APP_V4';
        const plateInput = document.getElementById('placa');
        const listContainer = document.getElementById('listaRegistros');
        const counter = document.getElementById('contadorRegistros');
        const inspectorDisplay = document.getElementById('displayInspector');
        const btnReg = document.getElementById('btnRegistrar');
        
        let inspectorName = "";

        // Al iniciar
        window.onload = () => {
            const saved = localStorage.getItem('user_fiscal');
            if (!saved) {
                document.getElementById('modalConfig').classList.add('active');
            } else {
                inspectorName = saved;
                inspectorDisplay.innerText = inspectorName;
                renderizar();
            }
            document.getElementById('fechaHeader').innerText = new Date().toLocaleDateString('es-ES', { 
                weekday: 'long', day: 'numeric', month: 'long' 
            });
        };

        const guardarConfiguracion = () => {
            const name = document.getElementById('nombreInspectorInput').value.trim();
            if (name.length < 3) return alert("Por favor, ingrese un nombre válido.");
            localStorage.setItem('user_fiscal', name);
            inspectorName = name;
            inspectorDisplay.innerText = name;
            document.getElementById('modalConfig').classList.remove('active');
            renderizar();
        };

        // Formateo de placa
        plateInput.addEventListener('input', (e) => {
            let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (val.length > 3) val = val.slice(0, 3) + '-' + val.slice(3, 6);
            e.target.value = val;
            btnReg.disabled = val.length < 7;
        });

        const guardar = () => {
            const nuevo = {
                id: Date.now(),
                placa: plateInput.value,
                tipo: document.getElementById('tipoInfraccion').value,
                obs: document.getElementById('observacion').value || "Sin detalles",
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                inspector: inspectorName
            };

            const db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            db.unshift(nuevo);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));

            // Limpiar
            plateInput.value = '';
            document.getElementById('observacion').value = '';
            btnReg.disabled = true;
            renderizar();
        };

        const renderizar = () => {
            const db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            counter.innerText = db.length;

            if (db.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-12">
                        <div class="text-slate-200 mb-2 flex justify-center">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                        </div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Sin registros registrados hoy</p>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = db.map(item => `
                <div class="bg-white rounded-3xl p-5 border border-slate-100 card-shadow">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="plate-font text-xl text-slate-900">${item.placa}</span>
                            <div class="mt-1">
                                <span class="px-2 py-1 rounded-lg text-[9px] font-black uppercase ${item.tipo === 'Operativo Normal' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${item.tipo}
                                </span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-300 uppercase">${item.hora}</p>
                            <button onclick="eliminarRegistro(${item.id})" class="mt-2 text-slate-200 hover:text-red-500 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                    <p class="text-xs text-slate-500 mt-3 font-medium bg-slate-50 p-3 rounded-xl border border-slate-100 italic">
                        "${item.obs}"
                    </p>
                </div>
            `).join('');
        };

        window.eliminarRegistro = (id) => {
            if (confirm("¿Eliminar esta intervención?")) {
                const db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(db.filter(r => r.id !== id)));
                renderizar();
            }
        };

        window.confirmarLimpieza = () => {
            if (confirm("⚠️ ¿ESTÁ SEGURO?\n\nEsta acción borrará TODA la jornada del teléfono. Asegúrese de haber descargado el CSV antes.")) {
                localStorage.removeItem(STORAGE_KEY);
                renderizar();
            }
        };

        const exportarCSV = () => {
            const db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            if (db.length === 0) return alert("No hay datos para exportar.");
            
            let csv = "\uFEFFHora,Placa,Infraccion,Observaciones,Inspector\n";
            db.forEach(r => {
                csv += `"${r.hora}","${r.placa}","${r.tipo}","${r.obs.replace(/"/g, '""')}","${r.inspector}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Reporte_${inspectorName.replace(/ /g, '_')}_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        };
    </script>
</body>
</html>
