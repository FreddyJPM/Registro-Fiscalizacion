<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fiscalización Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .plate-font { font-family: 'Courier New', monospace; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #modalConfig { display: none; }
        #modalConfig.active { display: flex; }
    </style>
</head>
<body class="pb-24">

    <!-- Modal de Identificación -->
    <div id="modalConfig" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm card-shadow text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2">Identificación</h3>
            <p class="text-slate-500 mb-6 text-sm">Ingrese su nombre para comenzar el registro local.</p>
            <input type="text" id="nombreInspectorInput" placeholder="Nombre completo" 
                class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none mb-4 text-center font-semibold text-lg">
            <button onclick="guardarConfiguracion()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all active:scale-95 shadow-lg shadow-blue-200">
                COMENZAR TURNO
            </button>
        </div>
    </div>

    <div class="max-w-xl mx-auto p-4 space-y-4">
        <!-- Header -->
        <header class="bg-slate-900 rounded-[2rem] p-6 text-white card-shadow relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tight">Fiscalización Local</h1>
                        <p id="fechaHeader" class="text-slate-400 text-xs font-medium"></p>
                    </div>
                    <div class="bg-blue-600/20 px-4 py-2 rounded-2xl border border-blue-500/30 text-center">
                        <span id="contadorRegistros" class="text-2xl font-black text-blue-400">0</span>
                        <p class="text-[8px] uppercase font-bold text-blue-300">Mis Registros</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3 bg-white/5 p-3 rounded-2xl border border-white/10">
                    <div class="w-3 h-3 bg-slate-400 rounded-full"></div>
                    <p id="displayInspector" class="text-xs font-bold truncate">Cargando...</p>
                </div>
            </div>
        </header>

        <!-- Formulario -->
        <main class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Placa del Vehículo</label>
                    <input type="text" id="placa" placeholder="ABC-123" maxlength="7"
                        class="plate-font w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:bg-white focus:outline-none text-2xl text-center transition-all">
                </div>
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Infracción</label>
                    <select id="tipoInfraccion" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 font-semibold text-slate-700">
                        <option value="Operativo Normal">✅ Operativo Normal</option>
                        <option value="Placa distinta al servicio">⚠️ Placa distinta al servicio</option>
                        <option value="Sin SOAT Vigente">❌ Sin SOAT Vigente</option>
                        <option value="Fuera de Ruta">🛣️ Fuera de Ruta</option>
                        <option value="Sin Licencia">🆔 Sin Licencia</option>
                        <option value="Vehículo Informal">🚗 Vehículo Informal</option>
                        <option value="Otros">📝 Otros</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Observaciones</label>
                    <textarea id="observacion" rows="2" placeholder="Detalles..."
                        class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 text-sm font-medium"></textarea>
                </div>

                <button id="btnRegistrar" onclick="procesarRegistro()" disabled
                    class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-200 disabled:bg-slate-100 disabled:text-slate-300 uppercase tracking-widest text-sm transition-all active:scale-95">
                    Guardar en Memoria
                </button>
            </div>
        </main>

        <!-- Herramientas -->
        <div class="flex justify-between items-center px-4 text-[11px] font-extrabold tracking-tighter">
            <button onclick="exportarCSV()" class="text-blue-600">📥 EXPORTAR REPORTE (CSV)</button>
            <button onclick="limpiarTodo()" class="text-red-400">🗑️ VACIAR LISTA</button>
        </div>

        <div id="listaRegistros" class="space-y-4 px-2"></div>
    </div>

    <script>
        const plateInput = document.getElementById('placa');
        const listContainer = document.getElementById('listaRegistros');
        const counter = document.getElementById('contadorRegistros');
        const btnReg = document.getElementById('btnRegistrar');
        const inspectorDisplay = document.getElementById('displayInspector');
        const modal = document.getElementById('modalConfig');
        const nombreInput = document.getElementById('nombreInspectorInput');

        // Almacenamiento local clave
        const DB_KEY = 'registros_fiscalizacion_local';

        // 1. Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            inicializarApp();
        });

        function inicializarApp() {
            const nombre = localStorage.getItem('user_fiscal_nombre');
            if (!nombre) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
                inspectorDisplay.innerText = nombre + " (Modo Local)";
            }
            renderizar(obtenerRegistros());
            document.getElementById('fechaHeader').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        window.guardarConfiguracion = () => {
            const name = nombreInput.value.trim();
            if (name.length < 3) {
                alert("Ingrese un nombre válido (mínimo 3 caracteres).");
                return;
            }
            // Guardar en almacenamiento local
            localStorage.setItem('user_fiscal_nombre', name);
            
            // Actualizar interfaz sin recargar la página para evitar bucles
            modal.classList.remove('active');
            inspectorDisplay.innerText = name + " (Modo Local)";
            
            // Limpiar el input por si acaso
            nombreInput.value = "";
        };

        // 2. Manejo de Datos (CRUD Local)
        function obtenerRegistros() {
            try {
                return JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            } catch(e) {
                return [];
            }
        }

        window.procesarRegistro = () => {
            const nombreInspector = localStorage.getItem('user_fiscal_nombre');
            if (!nombreInspector) {
                modal.classList.add('active');
                return;
            }

            const registros = obtenerRegistros();
            const nuevo = {
                placa: plateInput.value,
                tipo: document.getElementById('tipoInfraccion').value,
                obs: document.getElementById('observacion').value || "Sin detalles",
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                inspector: nombreInspector,
                timestamp: Date.now()
            };

            registros.unshift(nuevo);
            localStorage.setItem(DB_KEY, JSON.stringify(registros));
            
            // Limpiar y actualizar
            plateInput.value = '';
            document.getElementById('observacion').value = '';
            btnReg.disabled = true;
            renderizar(registros);
        };

        window.limpiarTodo = () => {
            if (!confirm("¿Desea borrar todos sus registros locales? Esta acción no se puede deshacer.")) return;
            localStorage.removeItem(DB_KEY);
            renderizar([]);
        };

        function renderizar(data) {
            counter.innerText = data.length;
            if (data.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-widest italic opacity-50">No hay registros guardados</div>';
                return;
            }
            listContainer.innerHTML = data.map(item => `
                <div class="bg-white rounded-3xl p-5 border border-slate-100 card-shadow">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="plate-font text-xl text-slate-900">${item.placa}</span>
                            <div class="mt-1">
                                <span class="px-2 py-1 rounded-lg text-[8px] font-black uppercase ${item.tipo.includes('Normal') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${item.tipo}
                                </span>
                            </div>
                        </div>
                        <div class="text-right text-[9px] font-black text-slate-300 uppercase">${item.hora}</div>
                    </div>
                    <p class="text-xs text-slate-500 mt-3 italic font-medium bg-slate-50 p-3 rounded-xl">"${item.obs}"</p>
                </div>
            `).join('');
        }

        // 3. Auxiliares e Interacción
        plateInput.addEventListener('input', (e) => {
            let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (val.length > 3) {
                val = val.slice(0, 3) + '-' + val.slice(3, 6);
            }
            e.target.value = val;
            btnReg.disabled = val.length < 7;
        });

        window.exportarCSV = () => {
            const data = obtenerRegistros();
            if (data.length === 0) return alert("No hay datos para exportar.");
            
            let csv = "\uFEFFHora,Placa,Infracción,Observaciones\n";
            data.forEach(r => csv += `"${r.hora}","${r.placa}","${r.tipo}","${r.obs.replace(/"/g, '""')}"\n`);
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Reporte_Fiscalizacion_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        };
    </script>
</body>
</html>
